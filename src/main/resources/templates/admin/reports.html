<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 40px;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-brand {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .nav-links a.dashboard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-links a.dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-links a.users {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .nav-links a.users:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
        }

        .nav-links a.events {
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            color: white;
        }

        .nav-links a.events:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 151, 30, 0.4);
        }

        .nav-links a.logout {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .nav-links a.logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(235, 51, 73, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            border-radius: 15px;
            padding: 30px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card h5 {
            font-size: 1em;
            margin-bottom: 15px;
            opacity: 0.9;
            font-weight: 500;
        }

        .stat-card h3 {
            font-size: 2.5em;
            font-weight: bold;
            margin: 0;
        }

        .bg-blue { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
        }
        
        .bg-green { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
        }
        
        .bg-orange { 
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); 
        }
        
        .bg-red { 
            background: linear-gradient(135deg, #cb2d3e 0%, #ef473a 100%); 
        }
        
        .bg-purple { 
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); 
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .card-header {
            padding: 20px 25px;
            font-size: 1.2em;
            font-weight: 600;
        }

        .card-header.bg-dark {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
        }

        .card-header.bg-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-body {
            padding: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9em;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        table tbody tr {
            transition: all 0.3s ease;
        }

        table tbody tr:hover {
            background: #f8f9ff;
            transform: scale(1.01);
        }

        table tbody tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                height: auto;
                padding: 15px 20px;
                gap: 15px;
            }

            .nav-brand {
                font-size: 1.3em;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-links a {
                padding: 8px 16px;
                font-size: 0.9em;
            }

            body {
                padding-top: 140px;
            }

            .container {
                padding: 20px 15px;
            }

            h2 {
                font-size: 1.8em;
                margin-bottom: 30px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .stat-card {
                padding: 20px;
            }

            .stat-card h3 {
                font-size: 2em;
            }

            .card-header {
                padding: 15px 20px;
                font-size: 1em;
            }

            .card-body {
                padding: 15px;
                overflow-x: auto;
            }

            table {
                font-size: 0.9em;
            }

            table th, table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-brand">GoEvent</div>
        <div class="nav-links">
            <a href="/admin/dashboard" class="dashboard">Dashboard</a>
            <a href="/admin/users" class="users">Users</a>
            <a href="/admin/events" class="events">Events</a>
            <a href="/login" class="logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">

    <h2>📊 Admin Dashboard</h2>

    <!-- ===== SUMMARY CARDS ===== -->
    <div class="stats-grid">
        <div class="stat-card bg-blue">
            <h5>Total Customers</h5>
            <h3 th:text="${totalCustomers}">0</h3>
        </div>

        <div class="stat-card bg-green">
            <h5>Total Hosts</h5>
            <h3 th:text="${totalHosts}">0</h3>
        </div>

        <div class="stat-card bg-purple">
            <h5>Total Events</h5>
            <h3 th:text="${totalEvents}">0</h3>
        </div>

        <div class="stat-card bg-orange">
            <h5>Total Bookings</h5>
            <h3 th:text="${totalBookings}">0</h3>
        </div>
    </div>

    <!-- ===== TOP EVENTS TABLE ===== -->
    <div class="card">
        <div class="card-header bg-dark">
            🔥 Top Performing Events
        </div>
        <div class="card-body">
            <table>
                <thead>
                <tr>
                    <th>Event</th>
                    <th>Tickets Sold</th>
                    <th>Revenue</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event : ${topEvents}">
                    <td th:text="${event['name']}"></td>
                    <td th:text="${event['ticketsSold']}"></td>
                    <td>Rs <span th:text="${event['revenue']}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ===== TOP CUSTOMERS ===== -->
    <div class="card">
        <div class="card-header bg-secondary">
            👑 Top Customers
        </div>
        <div class="card-body">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Total Tickets</th>
                    <th>Total Spent</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${topCustomers}">
                    <td th:text="${customer['name']}"></td>
                    <td th:text="${customer['bookings']}"></td>
                    <td>Rs <span th:text="${customer['spent']}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
