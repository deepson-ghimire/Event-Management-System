<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 40px;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-brand {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .nav-links a.dashboard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-links a.dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-links a.events {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-links a.events:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-links a.logout {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .nav-links a.logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(235, 51, 73, 0.4);
        }

        /* ===== CONTENT ===== */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin: 30px 0 25px;
            color: #333;
            font-size: 1.8em;
        }

        h2:first-of-type {
            margin-top: 0;
            font-size: 2.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== ALERTS ===== */
        .success {
            background: #f0fdf4;
            color: #166534;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            font-weight: 500;
            border-left: 4px solid #22c55e;
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            font-weight: 500;
            border-left: 4px solid #ef4444;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9em;
        }

        td {
            padding: 15px 16px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            text-decoration: none;
            margin-right: 8px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .approve {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
        }

        .delete {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(235, 51, 73, 0.4);
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                height: auto;
                padding: 15px 20px;
                gap: 15px;
            }

            .nav-brand {
                font-size: 1.3em;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
            }

            .nav-links a {
                padding: 8px 16px;
                font-size: 0.9em;
            }

            body {
                padding-top: 140px;
            }

            .content {
                padding: 25px 20px;
                margin: 0 10px;
            }

            h2 {
                font-size: 1.5em;
            }

            h2:first-of-type {
                font-size: 1.8em;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px 12px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 0.85em;
                margin-bottom: 5px;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="nav-container">
        <div class="nav-brand">GoEvent</div>
        <div class="nav-links">
            <a href="/admin/dashboard" class="dashboard">Dashboard</a>
            <a href="/admin/events" class="events">Events</a>
            <a href="/login" class="logout">Logout</a>
        </div>
    </div>
</nav>

<div class="content">
    <h2>Manage Users</h2>

    <!-- SUCCESS MESSAGE -->
    <div th:if="${param.success == 'deleted'}" class="success">
        ✅ User deleted successfully!
    </div>

    <!-- ERROR MESSAGE -->
    <div th:if="${param.error == 'admin'}" class="error">
        ❌ Admin user cannot be deleted!
    </div>

    <!-- ================= HOST TABLE ================= -->
    <h2>Hosts</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Approved</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${hosts}">
                <td th:text="${u.firstName}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.approved}"></td>
                <td>
                    <a th:if="${!u.approved}"
                       th:href="@{/admin/approve/{id}(id=${u.id})}"
                       class="btn approve">
                       Approve
                    </a>

                    <a th:href="@{/admin/delete-user/{id}(id=${u.id})}"
                       class="btn delete">
                       Delete
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- ================= USER TABLE ================= -->
    <h2>Users</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.firstName}"></td>
                <td th:text="${u.email}"></td>
                <td>
                    <a th:href="@{/admin/delete-user/{id}(id=${u.id})}"
                       class="btn delete">
                       Delete
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
