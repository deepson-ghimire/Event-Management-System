<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Bookings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 40px;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto;
            padding: 0 20px; display: flex;
            justify-content: space-between; align-items: center; height: 70px;
        }
        .nav-brand {
            font-size: 1.5em; font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a {
            padding: 10px 20px; text-decoration: none; border-radius: 8px;
            font-weight: 500; transition: all 0.3s ease; display: inline-block;
        }
        .nav-links a.dashboard { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .nav-links a.logout { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white; }
        .content { padding: 40px 20px; }
        h2 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .table-container {
            max-width: 1400px; margin: 30px auto; overflow-x: auto;
            background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 18px 15px; text-align: left; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.9em; white-space: nowrap;
        }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; color: #333; font-size: 0.95em; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: all 0.3s ease; }
        tbody tr:hover { background: #f8f9ff; transform: scale(1.005); box-shadow: 0 2px 8px rgba(102,126,234,0.1); }
        .amount { font-weight: 600; color: #11998e; }
        h3.event-title { margin: 20px 0 10px; color: #333; font-size: 1.5em; text-align: center; }
        @media(max-width:768px){ body{padding-top:120px;} h2{font-size:1.8em;} table{font-size:0.85em;} th,td{padding:10px 8px;} }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-brand">Host Panel</div>
            <div class="nav-links">
                <a href="/host/dashboard" class="dashboard">Dashboard</a>
                <a href="/login" class="logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="content">
        <h2>Bookings for Your Events</h2>

        <div th:each="event : ${events}">
            <h3 class="event-title" th:text="${event.name}">Event Name</h3>

            <div class="table-container" th:if="${#lists.size(event.bookings) > 0}">
                <table>
                    <thead>
                        <tr>
                            <th>Customer Email</th>
                            <th>Booked At</th>
                            <th>Tickets</th>
                            <th>Total Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${event.bookings}">
                            <td th:text="${b.customer.email}">customer@example.com</td>
                            <td th:text="${#temporals.format(b.bookingDateTime, 'yyyy-MM-dd HH:mm')}">2026-01-13 12:00</td>
                            <td th:text="${b.ticketCount}">1</td>
                            <td class="amount" th:text="'Rs ' + ${b.totalAmount}">Rs 0</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${#lists.size(event.bookings) == 0}">
                <p>No bookings for this event yet.</p>
            </div>
        </div>
    </div>
</body>
</html>
