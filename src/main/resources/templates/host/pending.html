<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Host Approval Pending</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .nav-links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(235, 51, 73, 0.4);
        }

        /* ===== CONTENT ===== */
        .content {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            color: #4f46e5;
            font-size: 2em;
            margin-bottom: 15px;
        }

        p {
            color: #444;
            font-size: 1.05em;
            margin-bottom: 10px;
        }

        .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .info {
            margin-top: 20px;
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            color: #374151;
            font-weight: 500;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(235, 51, 73, 0.4);
        }

        @media (max-width: 600px) {
            .content {
                margin: 0 15px;
                padding: 30px 20px;
            }

            h2 {
                font-size: 1.6em;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="nav-container">
        <div class="nav-brand">Event System</div>
        <div class="nav-links">
            <a href="/login">Logout</a>
        </div>
    </div>
</nav>

<div class="content">
    <div class="icon">⏳</div>

    <h2>Approval Pending</h2>

    <p>Your <strong>host account</strong> has been registered successfully.</p>
    <p>It is currently waiting for <strong>admin approval</strong>.</p>

    <div class="info">
        You will be able to access your host dashboard once the admin approves your account.
    </div>

    <a href="/login" class="logout-btn">Logout</a>
</div>

</body>
</html>
