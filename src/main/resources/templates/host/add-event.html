<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Event</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 40px;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }
        .nav-brand {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a {
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
            color: white;
        }
        .dashboard { background: linear-gradient(135deg, #667eea, #764ba2); }
        .logout { background: linear-gradient(135deg, #eb3349, #f45c43); }

        .content { padding: 40px 20px; }
        h2 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; }
        .form-container { max-width: 700px; margin: auto; background: white; padding: 40px; border-radius: 12px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; width: 100%; }
        .back-link { text-align: center; margin-top: 20px; }
        .preview-img { max-width: 200px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>

<body>

<nav>
    <div class="nav-container">
        <div class="nav-brand">Host Panel</div>
        <div class="nav-links">
            <a href="/host/dashboard" class="dashboard">Dashboard</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </div>
</nav>

<div class="content">
    <h2>Add Event</h2>

    <div class="form-container">
        <form th:action="@{/host/add-event}" method="post" th:object="${event}" enctype="multipart/form-data">

            <div class="form-group">
                <label>Event Name</label>
                <input th:field="*{name}" placeholder="Enter event name" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input th:field="*{location}" placeholder="City / Area" required>
            </div>

            <div class="form-group">
                <label>Venue</label>
                <input th:field="*{venue}" placeholder="Venue Name / Hall / Stadium">
            </div>

            <div class="form-group">
                <label>Start Date & Time</label>
                <input type="datetime-local" th:field="*{eventStartDateTime}" required>
            </div>

            <div class="form-group">
                <label>End Date & Time</label>
                <input type="datetime-local" th:field="*{eventEndDateTime}" required>
            </div>

            <div class="form-group">
                <label>Guest Capacity</label>
                <input type="number" th:field="*{guestCapacity}" placeholder="Maximum guests allowed">
            </div>

            <div class="form-group">
                <label>Ticket Price</label>
                <input type="number" step="0.01" th:field="*{ticketPrice}" placeholder="0 for free events">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="Write event details here..."></textarea>
            </div>

            <div class="form-group">
                <label>Event Image</label>
                <input type="file" name="image" accept="image/*">
            </div>

            <button type="submit">Save Event</button>
        </form>

        <div class="back-link">
            <a th:href="@{/host/dashboard}">← Back to Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
