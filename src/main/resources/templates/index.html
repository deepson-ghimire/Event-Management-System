<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Homepage</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: #f4f6f9;
			display: flex;
			flex-direction: column;
			min-height: 100vh;
		}

		header {
			background: #1a73e8;
			color: white;
			padding: 15px 20px;
			text-align: center;
			font-size: 24px;
			font-weight: bold;
		}

		.container {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.card {
			background: white;
			padding: 30px;
			width: 350px;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
			border-radius: 10px;
			text-align: center;
		}

		p {
			font-size: 18px;
			margin-bottom: 20px;
		}

		a.button {
			display: inline-block;
			padding: 10px 20px;
			background: #1a73e8;
			color: white;
			text-decoration: none;
			font-weight: bold;
			border-radius: 5px;
			transition: 0.3s ease;
		}

		a.button:hover {
			background: #1558b0;
		}
	</style>
</head>

<body>

<header>
	GoEvent
</header>

<div class="container">
	<div class="card">
		<p>Welcome to the Landing Page</p>
		<a href="/register" class="button">Go to Register</a>

		<br><br>

		<!-- Extra button added -->
		<a href="/login" class="button" style="background:#34a853;">Login</a>
	</div>
</div>


</body>
</html>
