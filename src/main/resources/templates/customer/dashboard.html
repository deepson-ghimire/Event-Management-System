<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px; margin: 0 auto;
            padding: 0 20px; display: flex;
            justify-content: space-between; align-items: center; height: 70px;
        }

        .nav-brand {
            font-size: 1.5em; font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a {
            padding: 10px 20px; text-decoration: none; border-radius: 8px;
            font-weight: 500; transition: all 0.3s ease; display: inline-block;
        }

        .nav-links a.bookings {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
        }

        .nav-links a.logout {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white;
        }

        .content { padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        h2 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

		.cards-container {
		    display: grid;
		    grid-template-columns: repeat(auto-fill, minmax(300px, 300px)); /* wider card */
		    gap: 15px;                     /* reduced gap */
		    justify-content: center;        /* center cards nicely */
		}

		.card {
		    background: white;
		    border-radius: 12px;
		    overflow: hidden;
		    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
		    display: flex;
		    flex-direction: column;
		    height: 420px;                  /* uniform height */
		    width: 300px;                   /* fixed width */
		}

        .card img {
            width:100%;
            height:150px;
            object-fit:cover;
        }

        .card-content {
            display:flex;
            flex-direction:column;
            padding:15px;
            flex:1;
        }

        .card-content .card-text {
            overflow-y:auto;
            flex:1;
            margin-bottom:10px;
        }

        .card-content h3 {
            margin-bottom:5px;
            font-size:1.2em;
            color:#333;
        }

        .card-content p {
            font-size:0.85em;
            color:#555;
            margin-bottom:3px;
        }

        .card-content .host-email {
            font-weight:600;
        }

        .card-content a {
            display:inline-block;
            padding:8px 15px;
            text-decoration:none;
            border-radius:6px;
            font-weight:600;
            background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);
            color:white;
            text-align:center;
            transition: all 0.3s ease;
        }

        .card-content a:hover {
            transform: translateY(-2px);
            box-shadow:0 4px 12px rgba(17,153,142,0.4);
        }

        @media(max-width:768px){
            body{padding-top:120px;}
            h2{font-size:1.8em;}
            .card-content h3{font-size:1em;}
            .card{height:380px; max-width:100%;}
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-brand">Event Booking</div>
            <div class="nav-links">
                <a th:href="@{/customer/booking}" class="bookings">My Bookings</a>
                <a href="/login" class="logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="content">
        <h2>Available Events</h2>

        <div class="cards-container" th:if="${#lists.size(events) > 0}">
            <div class="card" th:each="e : ${events}">
				<img th:src="${e.imageUrl != null ? e.imageUrl : '/images/default-event.jpg'}" alt="Event Image"/>
                <div class="card-content">
                    <div class="card-text">
                        <h3 th:text="${e.name}">Event Name</h3>
                        <p th:text="${e.description}">Event description</p>
                        <p class="host-email">Host: <span th:text="${e.host.email}">host@example.com</span></p>
                        <p>Venue: <span th:text="${e.venue}">Venue Name</span></p>
                        <p>Location: <span th:text="${e.location}">City, Country</span></p>
                        <p>Start: <span th:text="${#temporals.format(e.eventStartDateTime,'yyyy-MM-dd HH:mm')}">Start Time</span></p>
                        <p>End: <span th:text="${#temporals.format(e.eventEndDateTime,'yyyy-MM-dd HH:mm')}">End Time</span></p>
                    </div>
                    <a th:href="@{/customer/book/{id}(id=${e.id})}">Book Now</a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(events)}" style="text-align:center; color:white; margin-top:40px;">
            <p>No events available at the moment.</p>
        </div>
    </div>
</body>
</html>
