<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding-top: 80px;
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.98); backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 1000;
        }

        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 20px;
                        display: flex; justify-content: space-between; align-items: center; height: 70px; }

        .nav-brand { font-size: 1.5em; font-weight: bold;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-links a { padding: 10px 20px; text-decoration: none; border-radius: 8px;
                      font-weight: 500; display: inline-block; color: white; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .content { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

        h2 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em;
             text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .cards-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
            gap: 20px;
        }

        .card { background:white; border-radius:12px; overflow:hidden;
                box-shadow:0 20px 60px rgba(0,0,0,0.3); display:flex; flex-direction:column; transition: all 0.3s ease; }

        .card:hover { transform: translateY(-5px); box-shadow:0 25px 70px rgba(0,0,0,0.35); }

        .card img { width:100%; height:180px; object-fit:cover; }

        .card-content { padding:20px; flex:1; display:flex; flex-direction:column; justify-content:space-between; }

        .card-content h3 { font-size:1.4em; color:#333; margin-bottom:10px; }
        .card-content p { font-size:0.95em; color:#555; margin-bottom:8px; }
        .amount { font-weight:600; color:#11998e; }

        .empty-state { text-align:center; color:white; font-size:1.2em; margin-top:50px; }

        @media(max-width:768px){ .content { padding:20px 10px; } h2 { font-size:1.8em; } }
    </style>
</head>
<body>
<nav>
    <div class="nav-container">
        <div class="nav-brand">My Bookings</div>
        <div class="nav-links">
            <a th:href="@{/customer/dashboard}">Dashboard</a>
        </div>
    </div>
</nav>

<div class="content">
    <h2>My Bookings</h2>

    <div class="cards-container" th:if="${#lists.size(bookings) > 0}">
        <div class="card" th:each="b : ${bookings}">
            <img th:src="${b.event.imageUrl}" alt="Event Image"/>
            <div class="card-content">
                <h3 th:text="${b.event.name}">Event Name</h3>
                <p th:text="${b.event.description}">Event description</p>
                <p class="host-email">Host: <span th:text="${b.event.host.email}">host@example.com</span></p>
                <p>Venue: <span th:text="${b.event.venue}">Venue Name</span></p>
                <p>Location: <span th:text="${b.event.location}">City, Country</span></p>
                <p>Start: <span th:text="${#temporals.format(b.event.eventStartDateTime,'yyyy-MM-dd HH:mm')}">Start Time</span></p>
                <p>End: <span th:text="${#temporals.format(b.event.eventEndDateTime,'yyyy-MM-dd HH:mm')}">End Time</span></p>
                <p>Tickets: <span th:text="${b.ticketCount}">1</span></p>
                <p>Total: <span class="amount" th:text="'Rs ' + ${b.totalAmount}">Rs 0</span></p>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.size(bookings) == 0}">
        <p>You have not booked any events yet.</p>
    </div>
</div>
</body>
</html>
