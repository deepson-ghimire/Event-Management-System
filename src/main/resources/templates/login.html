<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 25px 35px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #1558b0;
        }

        p {
            text-align: center;
            color: red;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            text-decoration: none;
            color: #1a73e8;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <p th:if="${error.hasError}" th:text="${error.msg}"></p>

    <form action="/login" method="post" th:object="${form}">
        <div>
            <label>Email:</label>
            <input type="email" th:field="*{email}">
        </div>

        <div>
            <label>Password:</label>
            <input type="password" th:field="*{password}">
        </div>

        <div>
            <input type="submit" value="Login">
        </div>
    </form>

    <div class="register-link">
        Need an account? <a href="/register">Register here!</a>
    </div>

</div>

</body>
</html>
